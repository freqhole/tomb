[package]
name = "cli"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "freqhole"
path = "src/main.rs"

[dependencies]
grimoire = { path = "../grimoire" }
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
anyhow = "1"

[dev-dependencies]
tempfile = "3"
uuid = { version = "1", features = ["v4"] }

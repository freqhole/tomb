# test configuration for CLI integration tests
data_dir = "../data"

[database]
filename = "test.db"
auto_run_migrations = true

[media]
max_fs_file_size = 104857600
supported_audio_formats = ["mp3", "flac", "m4a", "ogg", "wav", "opus"]

[media.downloads]
enabled = false
ytdlp_command = "yt-dlp"

[musicbrainz]
enabled = false

[logging]
level = "warn"

[server]
id = "test-instance"
name = "GRIMOIRE TEST"
version = "0.1.0"
description = "TEST CONFIGURATION"
host = "127.0.0.1"
port = 3000

[server.auth]
webauthn_enabled = false

[server.static_files]
enabled = false

[server.cors]
enabled = false

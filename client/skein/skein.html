    <title>skein</title>
    <style>
      @font-face {
        font-family: "Space Grotesk";
        src: url("/fonts/space-grotesk.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Space Mono";
        src: url("/fonts/space-mono.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Caveat";
        src: url("/fonts/caveat.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Permanent Marker";
        src: url("/fonts/permanent-marker.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Silkscreen";
        src: url("/fonts/silkscreen.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Playfair Display";
        src: url("/fonts/playfair-display.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Atkinson Hyperlegible Next";
        src: url("/fonts/atkinson-hyperlegible-next.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "JetBrains Mono";
        src: url("/fonts/jetbrains-mono.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #canvas-root {
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }
      .boot-error {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: #ef4444;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        padding: 20px;
        text-align: center;
      }
      noscript {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: #888;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="canvas-root"></div>
    <noscript>skein requires javascript to run.</noscript>
    <script type="module" src="/src/standalone/boot.ts"></script>
  </body>
</html>

<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>skein widget gallery</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #1a1a2e;
        color: #c8c8d8;
        font-family: system-ui, -apple-system, sans-serif;
        padding: 24px;
      }
      h1 {
        font-size: 18px;
        font-weight: 500;
        margin-bottom: 20px;
        color: #e8e8f0;
      }
      .gallery {
        display: flex;
        flex-wrap: wrap;
        gap: 24px;
      }
      .widget-card {
        background: #252540;
        border: 1px solid #3a3a50;
        border-radius: 8px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .widget-card h2 {
        font-size: 14px;
        font-weight: 500;
        color: #c8c8d8;
      }
      .widget-card .description {
        font-size: 11px;
        color: #888;
      }
      .widget-card .meta {
        font-size: 10px;
        color: #666;
      }
      .widget-mount {
        background: #1a1a2e;
        border: 1px solid #3a3a50;
        border-radius: 4px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <h1>skein widget gallery</h1>
    <div class="gallery" id="gallery"></div>
    <script type="module" src="/src/dev/gallery.ts"></script>
  </body>
</html>

# release build pipeline. runs while the changesets "Version Packages" PR is
# open and (re)builds all platforms, uploading their assets to a DRAFT github
# release tagged with the upcoming version.
#
# triggers (no PAT needed):
#   - push to changeset-release/main (you pushing a commit to the version PR)
#   - the version PR reopened or synchronized (close+reopen it, or push to it)
#   - workflow_dispatch (rebuild a version on demand, e.g. after a flaky job)
# the changesets bot's own push uses GITHUB_TOKEN, which github's recursion
# guard stops from auto-triggering workflows - hence the user-driven levers above.
#
# builds run on the PR so problems get worked out before merge. when the version
# PR merges, changesets.yml just publishes this already-built draft (it does not
# rebuild anything).
#
# design goals:
#   - one draft release; every platform job uploads its own assets to it.
#   - jobs are independent (only `needs: create-release`) so a single failure
#     never blocks the others; use "re-run failed jobs" to retry one platform,
#     or build it locally with `make` and `gh release upload` by hand.
#   - uploads use --clobber so retries (and re-pushes of the PR) overwrite cleanly.
#   - signing/notarization happens when the matching secrets are present and is
#     skipped gracefully otherwise (the make targets already no-op without them).
name: release

on:
  push:
    branches:
      - "changeset-release/main"
  # closing + reopening the version PR, or pushing a commit to it, re-runs the
  # builds. (the changesets bot's own push uses GITHUB_TOKEN and is suppressed
  # by github's recursion guard, so these user-driven events are the lever.)
  pull_request:
    types: [reopened, synchronize]
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "version to (re)build, e.g. 0.1.29 (defaults to root package.json)"
        required: false
        type: string

concurrency:
  # normalize push (ref_name) and pull_request (head.ref) for the same branch to
  # one group so the two events don't double-build.
  group: release-build-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: create draft release
    # for pull_request events, only the version PR (head changeset-release/main)
    # should build. push + workflow_dispatch always proceed. downstream platform
    # jobs `needs` this, so skipping here skips them all.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.ref == 'changeset-release/main'
    runs-on: ${{ vars.LINUX_X86_64_RUNNER || 'ubuntu-24.04' }}
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: resolve version + tag
        id: meta
        run: |
          V="${{ github.event.inputs.version }}"
          if [ -z "$V" ]; then V="$(node -p "require('./package.json').version")"; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"

      - name: create draft release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists, leaving it as-is"
          else
            # target main: the tag is created at main HEAD when the draft is
            # published (after the version PR merges).
            gh release create "$TAG" --draft --target main --generate-notes --title "$TAG"
          fi

      # set the draft body to the changeset changelog + generated notes so the
      # "what changed" text is visible in the draft (not just after publish).
      # idempotent: re-runs on each push to the version PR replace the body.
      - name: set draft release notes from changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/release-notes.mjs "${{ steps.meta.outputs.tag }}"

  # ---- macOS arm64: rathole cli + charnel .dmg ------------------------------
  mac-arm64:
    name: macOS arm64 (cli + dmg)
    needs: create-release
    runs-on: ${{ vars.MACOS_ARM64_RUNNER || 'macos-14' }}
    env:
      DATABASE_URL: sqlite:data/grimoire.db
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features sqlite,rustls --locked
      - name: set up database
        run: make db-migrate
      - name: import apple signing certificate
        if: env.APPLE_CERTIFICATE_P12_BASE64 != ''
        run: |
          KEYCHAIN=build.keychain
          KEYCHAIN_PWD="$(openssl rand -base64 24)"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          rm -f cert.p12
      - name: install charnel + spume deps
        run: |
          (cd client-codegen/freqhole-api-client && npm ci)
          (cd client/spume && npm ci)
          (cd client/charnel && npm ci)
      # grimoire embeds client/spume/dist via include_dir!, so the frontend
      # must be built before the cli (which links grimoire) compiles.
      - name: build spume client
        run: make build-spume
      - name: build rathole cli (arm64)
        run: make build-mac-arm
      - name: build charnel dmg (arm64)
        run: make build-tauri-mac-arm
      - name: upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          V="${{ needs.create-release.outputs.version }}"
          gh release upload "$TAG" \
            "build/$V/rathole_${V}_darwin-aarch64" \
            "build/$V/freqhole_charnel_${V}_aarch64.dmg" \
            --clobber

  # ---- macOS x86_64: rathole cli + charnel .dmg -----------------------------
  mac-intel:
    name: macOS x86_64 (cli + dmg)
    needs: create-release
    runs-on: ${{ vars.MACOS_X86_64_RUNNER || 'macos-13' }}
    env:
      DATABASE_URL: sqlite:data/grimoire.db
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features sqlite,rustls --locked
      - name: set up database
        run: make db-migrate
      - name: import apple signing certificate
        if: env.APPLE_CERTIFICATE_P12_BASE64 != ''
        run: |
          KEYCHAIN=build.keychain
          KEYCHAIN_PWD="$(openssl rand -base64 24)"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          rm -f cert.p12
      - name: install charnel + spume deps
        run: |
          (cd client-codegen/freqhole-api-client && npm ci)
          (cd client/spume && npm ci)
          (cd client/charnel && npm ci)
      # grimoire embeds client/spume/dist via include_dir!, so the frontend
      # must be built before the cli (which links grimoire) compiles.
      - name: build spume client
        run: make build-spume
      - name: build rathole cli (x86_64)
        run: make build-mac-intel
      - name: build charnel dmg (x86_64)
        run: make build-tauri-mac-intel
      - name: upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          V="${{ needs.create-release.outputs.version }}"
          gh release upload "$TAG" \
            "build/$V/rathole_${V}_darwin-x86_64" \
            "build/$V/freqhole_charnel_${V}_x86_64.dmg" \
            --clobber

  # ---- Linux x86_64: rathole cli + charnel .deb/.rpm (docker) ---------------
  linux-x86_64:
    name: linux x86_64 (cli + deb/rpm)
    needs: create-release
    runs-on: ${{ vars.LINUX_X86_64_RUNNER || 'ubuntu-24.04' }}
    env:
      DATABASE_URL: sqlite:data/grimoire.db
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install host deps (sqlite + alsa for db-prepare)
        run: sudo apt-get update && sudo apt-get install -y sqlite3 libasound2-dev
      - name: install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features sqlite,rustls --locked
      # the docker build COPYs the workspace (incl. client/spume/dist) into the
      # image; grimoire embeds that dir via include_dir!, so it must be built on
      # the host first or the cli compile inside docker panics.
      - name: build spume client
        run: make build-spume
      - name: build rathole cli (linux x86_64)
        run: make build-linux
      - name: build charnel deb/rpm (linux x86_64)
        run: make build-tauri-linux-intel
      - name: upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          V="${{ needs.create-release.outputs.version }}"
          gh release upload "$TAG" \
            "build/$V/rathole_${V}_linux-x86_64" \
            "build/$V/freqhole_charnel_${V}_x86_64.deb" \
            "build/$V/freqhole_charnel_${V}_x86_64.rpm" \
            --clobber

  # ---- Linux arm64: rathole cli + charnel .deb/.rpm (native arm runner) -----
  linux-arm64:
    name: linux arm64 (cli + deb/rpm)
    needs: create-release
    runs-on: ${{ vars.LINUX_ARM64_RUNNER || 'ubuntu-24.04-arm' }}
    env:
      DATABASE_URL: sqlite:data/grimoire.db
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install host deps (sqlite + alsa for db-prepare)
        run: sudo apt-get update && sudo apt-get install -y sqlite3 libasound2-dev
      - name: install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features sqlite,rustls --locked
      # the docker build COPYs the workspace (incl. client/spume/dist) into the
      # image; grimoire embeds that dir via include_dir!, so it must be built on
      # the host first or the cli compile inside docker panics.
      - name: build spume client
        run: make build-spume
      - name: build rathole cli (linux aarch64)
        run: make build-pi
      - name: build charnel deb/rpm (linux aarch64)
        run: make build-tauri-linux-arm64
      - name: upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          V="${{ needs.create-release.outputs.version }}"
          gh release upload "$TAG" \
            "build/$V/rathole_${V}_linux-aarch64" \
            "build/$V/freqhole_charnel_${V}_aarch64.deb" \
            "build/$V/freqhole_charnel_${V}_aarch64.rpm" \
            --clobber

  # ---- Flatpak x86_64 (needs the x86_64 .deb from the release) --------------
  flatpak-x86_64:
    name: flatpak x86_64
    needs: [create-release, linux-x86_64]
    runs-on: ${{ vars.LINUX_X86_64_RUNNER || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@v4
      - name: fetch the x86_64 deb from the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          V="${{ needs.create-release.outputs.version }}"
          mkdir -p "build/$V"
          gh release download "$TAG" \
            --pattern "freqhole_charnel_${V}_x86_64.deb" \
            --dir "build/$V" --clobber
      - name: build flatpak (x86_64)
        run: make build-flatpak-intel
      - name: upload asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          V="${{ needs.create-release.outputs.version }}"
          gh release upload "$TAG" \
            "build/$V/freqhole_charnel_${V}_x86_64.flatpak" \
            --clobber

  # ---- Flatpak arm64 (needs the arm64 .deb from the release) ----------------
  flatpak-arm64:
    name: flatpak arm64
    needs: [create-release, linux-arm64]
    runs-on: ${{ vars.LINUX_ARM64_RUNNER || 'ubuntu-24.04-arm' }}
    steps:
      - uses: actions/checkout@v4
      - name: fetch the arm64 deb from the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          V="${{ needs.create-release.outputs.version }}"
          mkdir -p "build/$V"
          gh release download "$TAG" \
            --pattern "freqhole_charnel_${V}_aarch64.deb" \
            --dir "build/$V" --clobber
      - name: build flatpak (aarch64)
        run: make build-flatpak-arm64
      - name: upload asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          V="${{ needs.create-release.outputs.version }}"
          gh release upload "$TAG" \
            "build/$V/freqhole_charnel_${V}_aarch64.flatpak" \
            --clobber

  # ---- Android: universal + arm64-only apks (best effort, non-blocking) ------
  # android in ci is the fiddliest target (ndk + sdk + apksigner + tauri android
  # init). it is non-blocking: if it fails, re-run it or build locally with
  # `make build-tauri-android` and `gh release upload` by hand.
  android:
    name: android (universal + arm64 apk)
    needs: create-release
    runs-on: ${{ vars.LINUX_X86_64_RUNNER || 'ubuntu-24.04' }}
    continue-on-error: true
    env:
      DATABASE_URL: sqlite:data/grimoire.db
      ANDROID_BUILD_TOOLS_VERSION: "34.0.0"
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: set up android sdk
        uses: android-actions/setup-android@v3
      - name: install ndk + build-tools
        run: sdkmanager "ndk;26.3.11579264" "build-tools;${ANDROID_BUILD_TOOLS_VERSION}"
      - name: export ndk path
        run: echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"
      - name: install host deps (sqlite + alsa for db-prepare)
        run: sudo apt-get update && sudo apt-get install -y sqlite3 libasound2-dev
      - name: install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features sqlite,rustls --locked
      - name: set up database
        run: make db-migrate
      - name: install charnel + spume deps
        run: |
          (cd client-codegen/freqhole-api-client && npm ci)
          (cd client/spume && npm ci)
          (cd client/charnel && npm ci)
      # no explicit spume build here: charnel's tauri `beforeBuildCommand` builds
      # spume (in charnel mode, VITE_CHARNEL_MODE=true) into spume/dist, which is
      # tauri's frontendDist. this mirrors `make build-tauri-android` exactly.
      - name: init tauri android project (if not committed)
        run: |
          if [ ! -d client/charnel/src-tauri/gen/android ]; then
            (cd client/charnel && npm run tauri android init)
          fi
      - name: decode android keystore
        if: env.ANDROID_KEY_ALIAS != ''
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "ANDROID_KEYSTORE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
      - name: build apks
        run: |
          make build-tauri-android
          make build-tauri-android-arm64
      - name: upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          V="${{ needs.create-release.outputs.version }}"
          gh release upload "$TAG" \
            "build/$V/freqhole_charnel_${V}_android-universal.apk" \
            "build/$V/freqhole_charnel_${V}_android-arm64.apk" \
            --clobber

  # ---- Raspberry Pi 32-bit (armv7) cli — best effort, non-blocking ----------
  pi32:
    name: pi32 armv7 cli (best effort)
    needs: create-release
    runs-on: ${{ vars.LINUX_X86_64_RUNNER || 'ubuntu-24.04' }}
    continue-on-error: true
    env:
      DATABASE_URL: sqlite:data/grimoire.db
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install host deps (sqlite + alsa for db-prepare)
        run: sudo apt-get update && sudo apt-get install -y sqlite3 libasound2-dev
      - name: install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features sqlite,rustls --locked
      # the docker build COPYs the workspace (incl. client/spume/dist) into the
      # image; grimoire embeds that dir via include_dir!, so it must be built on
      # the host first or the cli compile (and db-prepare) panics.
      - name: build spume client
        run: make build-spume
      - name: build rathole cli (linux armv7)
        run: make build-pi32
      - name: upload asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          V="${{ needs.create-release.outputs.version }}"
          gh release upload "$TAG" \
            "build/$V/rathole_${V}_linux-armv7" \
            --clobber

# fast checks on every pull request. heavy platform builds live in release.yml
# and only run post-merge on a version tag. keep this workflow quick.
name: pr checks

on:
  pull_request:
    branches: [main]

# cancel superseded runs on the same PR.
concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  DATABASE_URL: sqlite:data/grimoire.db
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    name: rust (fmt + clippy + check + unit tests)
    runs-on: ${{ vars.LINUX_X86_64_RUNNER || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: install system deps (alsa, sqlite, gtk/webkit for tauri)
        # charnel (tauri desktop app) pulls glib-sys/gtk/webkit via its build
        # tree, so the dev libs must be present or pkg-config fails. webkit2gtk
        # 4.1 transitively provides glib, soup, javascriptcore .pc files.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev sqlite3 \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features sqlite,rustls --locked

      - name: set up database (migrations + views + blob db)
        run: make db-migrate

      # grimoire embeds client/spume/dist via include_dir! at compile time. the
      # frontend isn't built in this rust-only job, so provide a placeholder dir
      # to satisfy the macro (the served assets aren't exercised by these checks).
      - name: ensure spume dist placeholder exists
        run: |
          mkdir -p client/spume/dist
          [ -e client/spume/dist/index.html ] || echo '<!doctype html>' > client/spume/dist/index.html

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo unit tests
        # lib + bin unit tests only. the cli integration suite (make test-cli)
        # is slower + fixture-driven and runs outside the fast PR path.
        run: cargo test --workspace --lib --bins

  web-check:
    name: web (typecheck + vitest + circular deps)
    runs-on: ${{ vars.LINUX_X86_64_RUNNER || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # midden wasm pkg/ and the generated api client are committed, so spume
      # typechecks against them without a wasm rebuild here. but spume links
      # freqhole-api-client by `file:` (a symlink to its raw TS source), so its
      # own deps (zod, @tauri-apps/api) must be installed in that folder first
      # or tsc can't resolve them. mirrors the cloudflare build order.
      - name: install api-client deps
        working-directory: client-codegen/freqhole-api-client
        run: npm ci

      - name: install spume deps
        working-directory: client/spume
        run: npm ci

      - name: typecheck
        working-directory: client/spume
        run: npm run typecheck

      - name: unit tests
        working-directory: client/spume
        run: npm test

      - name: circular dependency check
        working-directory: client/spume
        run: npm run lint:circular

  # eslint is split into its own status check: there's a backlog to clean up,
  # so keep it visible + independent of the core web gate above.
  lint:
    name: web (eslint)
    runs-on: ${{ vars.LINUX_X86_64_RUNNER || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # eslint resolves imports into the api-client `file:` symlink, so its
      # deps must be present too (same reason as the typecheck job).
      - name: install api-client deps
        working-directory: client-codegen/freqhole-api-client
        run: npm ci

      - name: install spume deps
        working-directory: client/spume
        run: npm ci

      - name: lint
        working-directory: client/spume
        run: npm run lint

  changeset-check:
    name: changeset present
    runs-on: ${{ vars.LINUX_X86_64_RUNNER || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # changeset status diffs against the base branch.
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install changesets
        run: npm install --no-save @changesets/cli

      - name: verify a changeset was added
        run: |
          if ! npx changeset status --since=origin/${{ github.base_ref }}; then
            echo "::error::no changeset found. run 'npx changeset' and commit the result."
            echo "::error::pick patch/minor/major and write a short summary for the release notes."
            exit 1
          fi

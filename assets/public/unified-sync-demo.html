        }

        .status-badge.success {

        }

        .status-badge.error {

          color: #f8d7da;
        }

        .connection-section,

        .log-section {

        .connection-section h3,

          color: white;
        }

        .connection-status {

          align-items: center;
          gap: 15px;
        }

        .connection-buttons {
          display: flex;
          gap: 10px;
        }

        .toggle-control {

          gap: 8px;
          cursor: pointer;
          color: white;
        }

        .sync-controls {
          display: flex;
          align-items: center;
          gap: 20px;
        }

        .btn {
          padding: 10px 20px;
          border: none;
          border-radius: 4px;
          font-size: 14px;
          font-weight: 500;
          cursor: pointer;
          transition: all 0.2s;
        }

        .btn:disabled {
          opacity: 0.6;
          cursor: not-allowed;
        }

        .btn-primary {
          background: #007bff;
          color: white;
        }

        .btn-primary:hover:not(:disabled) {
          background: #0056b3;
        }

        .btn-secondary {
          background: #6c757d;
          color: white;
        }

        .btn-secondary:hover:not(:disabled) {
          background: #545b62;
        }

        .btn-sync {
          background: magenta;
          color: black;
          position: relative;
          font-weight: 600;
        }

        .btn-sync:hover:not(:disabled) {
          background: #ff40ff;
        }

        .btn-sync.syncing {
          background: #cc00cc;
          animation: pulse 2s infinite;
        }

        @keyframes pulse {
          0% {
            opacity: 1;
          }
          50% {
            opacity: 0.7;
          }
          100% {
            opacity: 1;
          }
        }

        .last-sync {
          font-size: 12px;
          color: #ccc;
        }

        .progress-bar {
          width: 100%;
          height: 8px;
          background: #333;
          border-radius: 4px;
          overflow: hidden;
          margin-bottom: 10px;
        }

        .progress-fill {
          height: 100%;

          transition: width 0.3s ease;
        }

        .progress-text {
          text-align: center;
          font-size: 14px;
          color: white;
        }

        .domain-grid {

          grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
          gap: 15px;
        }

        .domain-card {
          padding: 15px;
          border-radius: 6px;
          border: 1px solid #333;
          background: #222;
        }

        .domain-card.complete {
          border-color: #0f0;
          background: #003300;
        }

        .domain-card.in_progress {
          border-color: magenta;
          background: #330033;
        }

        .domain-card.never {
          border-color: #666;
          background: #1a1a1a;
        }

        .domain-name {

          margin-bottom: 5px;

          color: white;
        }

        .domain-status {
          font-size: 12px;
          color: #ccc;
          margin-bottom: 5px;
        }

        .domain-progress {
          font-size: 11px;
          color: #aaa;
        }

          overflow-y: auto;
          background: #000;
          border: 1px solid #333;
          border-radius: 4px;
          padding: 10px;
        }

        .log-entry {

          font-size: 12px;
          padding: 2px 0;
          border-bottom: 1px solid #333;
          color: #ccc;
        }

        .log-entry:last-child {
          border-bottom: none;
        }

        .log-empty {
          text-align: center;
          color: #666;
          font-style: italic;
          padding: 20px;
        }

        .error-message {
          margin-top: 10px;
          padding: 10px;
          background: #330000;
          border: 1px solid #660000;
          border-radius: 4px;
          color: #ff6666;
          font-size: 14px;
        }

        .horizontal-progress-container {
          margin-bottom: 20px;
          padding: 16px;
          background: #111;
          border: 1px solid #333;
          border-radius: 8px;
        }

        .horizontal-progress-bar {
          width: 100%;
          height: 12px;
          background: #333;
          border-radius: 6px;
          overflow: hidden;
          position: relative;
          margin-bottom: 8px;
        }

        .horizontal-progress-fill {
          height: 100%;
          border-radius: 6px;
          transition: width 0.5s ease;
          position: relative;
        }

        .horizontal-progress-fill::after {
          content: "";
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: linear-gradient(
            90deg,
            transparent,
            rgba(255, 255, 255, 0.3),
            transparent
          );
          animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
          0% {
            transform: translateX(-100%);
          }
          100% {
            transform: translateX(100%);
          }
        }

        .horizontal-progress-text {
          display: flex;
          justify-content: space-between;
          align-items: center;
          font-size: 14px;
          color: white;
        }

        .progress-percentage {
          font-weight: 600;
          color: magenta;
          font-size: 16px;
        }

        .progress-items {
          color: #ccc;
        }

        .progress-initializing {
          color: magenta;
          font-weight: 500;
        }

        .progress-operation {
          color: #ccc;
          font-size: 13px;
          font-style: italic;
        }

        .image-grid-section {
          margin-bottom: 25px;
          padding: 20px;
          background: #111;
          border-radius: 6px;
          border: 1px solid #333;
        }

        .image-grid-section h3 {
          margin: 0 0 15px 0;
          font-size: 16px;
          color: white;
        }

        .image-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
          gap: 10px;
          margin-top: 15px;
        }

        .image-item {
          display: flex;
          justify-content: center;
          align-items: center;
          background: black;
          color: white;
          border-radius: 4px;
          overflow: hidden;
        }

        .grid-image {
          width: 100px;
          height: 100px;
          object-fit: cover;
          border: 2px solid #333;
          border-radius: 6px;
          transition: all 0.3s ease;
          background: #222;
        }

        .grid-image:hover {
          transform: scale(1.05);
          box-shadow: 0 4px 15px rgba(255, 0, 255, 0.3);
        }

        .storage-stats {
          margin-bottom: 25px;
          padding: 20px;
          background: #111;
          border-radius: 6px;
          border: 1px solid #333;

          border: 1px solid #444;

          font-weight: 500;
          font-size: 14px;
        }

        .connection-text.connected {
          color: #0f0;
        }

        .connection-text.disconnected {
          color: #f00;
        }

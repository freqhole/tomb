        .generic-infinite-grid {
          height: 100vh;

        }

        .light .grid-header {
          background: #f8f9fa;
          border-bottom-color: #dee2e6;
        }

        .header-cell {
          flex: 1;
          padding: 0 12px;
          font-weight: 600;
          font-size: 14px;

          background: rgba(0, 0, 0, 0.7);
        }

          background: #e9ecef;
        }

        .header-cell:last-child {
          border-right: none;
        }

        .header-cell.sort-asc .sort-indicator,
        .header-cell.sort-desc .sort-indicator {
          color: #ff00ff;
          font-weight: bold;
        }

        .header-cell.sort-asc,
        .header-cell.sort-desc {
          background: rgba(0, 0, 0, 0.8);
        }

        .header-cell.sort-asc .sort-indicator:after {
          content: " ↑";
          color: #ff00ff;
          margin-left: 4px;
        }

        .header-cell.sort-desc .sort-indicator:after {
          content: " ↓";
          color: #ff00ff;

        }

        .sort-icon {

        }

        .light .header-cell.sort-asc,
        .light .header-cell.sort-desc {
          background: #e2e8f0;
        }

        .header-cell.not-sortable {
          cursor: default;
        }

        .header-cell.not-sortable:hover {
          background: transparent;
        }

          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .sort-icon {
          margin-left: 8px;
          opacity: 0.6;
          font-size: 12px;
          flex-shrink: 0;
        }

          overflow: auto;
          position: relative;
          scroll-behavior: smooth;
        }

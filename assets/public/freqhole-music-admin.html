        .generic-infinite-grid {

          top: 0;
          z-index: 5;
        }

        .light .grid-header {
          background: #f8f9fa;
          border-bottom-color: #dee2e6;
        }

        .header-cell {
          flex: 1;
          padding: 0 12px;
          font-weight: 600;
          font-size: 14px;
          cursor: pointer;
          user-select: none;

        }

        .header-cell:hover {
          background: #3a3a3a;
        }

        .light .header-cell:hover {
          background: #e9ecef;
        }

        .header-cell:last-child {
          border-right: none;
        }

        .header-cell.sort-asc .sort-indicator,
        .header-cell.sort-desc .sort-indicator {
          color: #ff00ff;
          font-weight: bold;
        }

        .header-cell.sort-asc,
        .header-cell.sort-desc {
          background: #2d2d2d;
        }

        .header-cell.sort-asc .sort-indicator:after {
          content: " ↑";
          color: #ff00ff;
          margin-left: 4px;
        }

        .header-cell.sort-desc .sort-indicator:after {
          content: " ↓";
          color: #ff00ff;
          margin-left: 4px;
        }

        .sort-icon {
          display: none;
        }

        .light .header-cell.sort-asc,
        .light .header-cell.sort-desc {
          background: #e2e8f0;
        }

        .header-cell.not-sortable {
          cursor: default;
        }

        .header-cell.not-sortable:hover {
          background: transparent;
        }

        .header-title {

          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .sort-icon {
          margin-left: 8px;
          opacity: 0.6;
          font-size: 12px;
          flex-shrink: 0;
        }

        .grid-viewport {
          flex: 1;
          overflow: auto;
          position: relative;
          scroll-behavior: smooth;
        }

        .grid-content {
          position: relative;
        }

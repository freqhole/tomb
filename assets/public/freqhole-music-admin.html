        .generic-infinite-grid {
          height: 100vh;
          background: #171717;
          color: #e0e0e0;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          display: flex;
          flex-direction: column;
          overflow: hidden;
        }

        .generic-infinite-grid.light {
          background: #ffffff;
          color: #1a1a1a;

          background: rgba(0, 0, 0, 0.9);
          border-bottom: none;
          display: flex;
          align-items: center;
          position: sticky;
          top: 0;
          z-index: 50;
        }

        .light .grid-header {
          background: #f8f9fa;
          border-bottom-color: #dee2e6;
        }

        .header-cell {
          flex: 1;
          padding: 0 12px;
          font-weight: 600;
          font-size: 14px;
          cursor: pointer;
          user-select: none;
          display: flex;
          align-items: center;
          justify-content: space-between;
          border-right: none;
          transition: background-color 0.2s;
          min-width: 0;
          height: 100%;
          position: relative;
        }

        .light .header-cell {
          border-right-color: #dee2e6;
        }

        .header-cell:hover {
          background: rgba(0, 0, 0, 0.7);
        }

        .light .header-cell:hover {
          background: #e9ecef;
        }

        .header-cell:last-child {
          border-right: none;
        }

        .header-cell.sort-asc .sort-indicator,
        .header-cell.sort-desc .sort-indicator {
          color: #ff00ff;
          font-weight: bold;
        }

        .header-cell.sort-asc,
        .header-cell.sort-desc {
          background: rgba(0, 0, 0, 0.8);
        }

        .header-cell.sort-asc .sort-indicator:after {
          content: " ↑";
          color: #ff00ff;
          margin-left: 4px;
        }

        .header-cell.sort-desc .sort-indicator:after {
          content: " ↓";
          color: #ff00ff;
          margin-left: 4px;
        }

        .sort-icon {
          display: none;
        }

        .light .header-cell.sort-asc,
        .light .header-cell.sort-desc {
          background: #e2e8f0;
        }

        .header-cell.not-sortable {
          cursor: default;
        }

        .header-cell.not-sortable:hover {
          background: transparent;
        }

        .header-title {
          flex: 1;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .sort-icon {
          margin-left: 8px;
          opacity: 0.6;
          font-size: 12px;
          flex-shrink: 0;
        }

        .grid-viewport {
          flex: 1;
          overflow: auto;
          position: relative;
          scroll-behavior: smooth;
        }

        .grid-content {
          position: relative;
          padding-bottom: 4rem;
        }

        .grid-row {
          height: ${e()}px;
          display: flex;
          align-items: center;
          border-bottom: none;
          background: rgba(0, 0, 0, 0.9);
          will-change: transform;
        }

        .light .grid-row {
          border-bottom-color: #dee2e6;
          background: #ffffff;
        }

        .grid-row:hover {
          background: rgba(0, 0, 0, 0.7);
        }

        .light .grid-row:hover {
          background: #f8f9fa;
        }

          background: rgba(217, 70, 239, 0.4) !important;
          box-shadow: inset 0 0 0 2px rgb(217, 70, 239) !important;
        }

        .light .grid-row.selected {
          background: rgba(217, 70, 239, 0.1) !important;
          box-shadow: inset 0 0 0 2px rgba(217, 70, 239, 0.6) !important;
        }

        .light .grid-row.selected:hover {
          background: rgba(217, 70, 239, 0.2) !important;

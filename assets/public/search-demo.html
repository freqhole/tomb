        .search-demo__sort-select {
          padding: 0.25rem 0.5rem;
          background: #333333;
          color: #ffffff;
          border: 1px solid #444444;
        }

        .search-demo__sort-direction {
          padding: 0.25rem 0.5rem;
          background: #333333;
          color: #ffffff;
          border: none;
          cursor: pointer;
          font-size: 0.8rem;
        }

        .search-demo__results {
          display: grid;
          gap: 1rem;
          margin-bottom: 2rem;
        }

        .search-demo__results--grid {
          grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        }

        .search-demo__results--list {
          grid-template-columns: 1fr;
        }

        .search-demo__result-item {
          display: flex;
          gap: 1rem;
          background: #2a2a2a;
          padding: 1rem;
          border: 1px solid #333333;
          transition: border-color 0.2s;
        }

        .search-demo__result-item:hover {
          border-color: #444444;
        }

        .search-demo__result-thumbnail {
          flex-shrink: 0;
        }

        .search-demo__thumbnail {
          width: 60px;
          height: 60px;
          object-fit: cover;
        }

        .search-demo__no-thumbnail {
          width: 60px;
          height: 60px;
          background: #333333;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 0.7rem;
          color: #888888;
        }

        .search-demo__result-content {
          flex: 1;
          display: flex;
          flex-direction: column;
          gap: 0.25rem;
        }

        .search-demo__result-title {
          font-weight: bold;
          color: #ffffff;
        }

        .search-demo__result-artist {
          color: #cccccc;
          font-size: 0.9rem;
        }

        .search-demo__result-album {
          color: #aaaaaa;
          font-size: 0.8rem;
        }

        .search-demo__result-meta {
          display: flex;
          gap: 0.75rem;
          font-size: 0.7rem;
          color: #888888;
          margin-top: 0.5rem;
        }

        .search-demo__favorite {
          color: #ff00ff;
          font-weight: bold;
        }

        .search-demo__no-results {
          text-align: center;
          padding: 3rem;
          color: #888888;
        }

        .search-demo__no-results-message {
          margin-bottom: 1rem;
          font-size: 1.1rem;
        }

        .search-demo__clear-all {
          padding: 0.75rem 1.5rem;
          background: #ff00ff;
          color: #ffffff;
          border: none;
          cursor: pointer;
          font-size: 1rem;
        }

        .search-demo__pagination {
          display: flex;
          justify-content: center;
          align-items: center;
          gap: 1rem;
          margin: 2rem 0;
        }

        .search-demo__page-btn {
          padding: 0.5rem 1rem;
          background: #333333;
          color: #ffffff;
          border: none;
          cursor: pointer;
          transition: background-color 0.2s;
        }

        .search-demo__page-btn:disabled {
          background: #222222;
          color: #666666;
          cursor: not-allowed;
        }

        .search-demo__page-btn:not(:disabled):hover {
          background: #444444;
        }

        .search-demo__page-info {
          color: #cccccc;
        }

        .search-demo__error {
          background: #3a1a1a;
          color: #ff6666;
          padding: 1rem;
          margin: 1rem 0;
          border: 1px solid #ff3333;
          display: flex;
          justify-content: space-between;
          align-items: center;
        }

        .search-demo__retry-btn {
          padding: 0.5rem 1rem;
          background: #ff3333;
          color: #ffffff;
          border: none;
          cursor: pointer;
        }

        .search-demo__debug {
          margin-top: 2rem;
          background: #1a1a1a;
          padding: 1rem;
          border: 1px solid #333333;
        }

        .search-demo__debug h3 {
          margin: 0 0 1rem 0;
          color: #cccccc;
        }

        .search-demo__debug-content {
          background: #0a0a0a;
          padding: 1rem;
          color: #888888;
          font-size: 0.8rem;
          overflow-x: auto;
          margin: 0;
        }

        @media (max-width: 768px) {
          .search-demo {
            padding: 1rem;
          }

          .search-demo__results--grid {
            grid-template-columns: 1fr;
          }

          .search-demo__filter-grid {
            grid-template-columns: 1fr;
          }

          .search-demo__results-header {
            flex-direction: column;
            gap: 1rem;
            align-items: flex-start;
          }
        }

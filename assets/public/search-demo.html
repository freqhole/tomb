        .search-demo {
          max-width: 1200px;
          margin: 0 auto;
          padding: 2rem;
          background: #1a1a1a;
          color: #ffffff;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          min-height: 100vh;
        }

        .search-demo__header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 2rem;
        }

        .search-demo__title {
          font-size: 1.8rem;
          font-weight: bold;
          margin: 0;
          color: #ffffff;
        }

        .search-demo__controls {
          display: flex;
          gap: 0.5rem;
        }

        .search-demo__view-toggle,
        .search-demo__debug-toggle {
          padding: 0.5rem 1rem;
          background: #333333;
          color: #ffffff;
          border: none;
          cursor: pointer;
          font-size: 0.9rem;
          transition: background-color 0.2s;
        }

        .search-demo__view-toggle:hover,
        .search-demo__debug-toggle:hover {
          background: #444444;
        }

        .search-demo__search-section {
          margin-bottom: 1.5rem;
        }

        .search-demo__search-input {
          position: relative;
          margin-bottom: 1rem;
        }

        .search-demo__input {
          width: 100%;
          padding: 1rem;
          background: #2a2a2a;
          color: #ffffff;
          border: 2px solid #333333;
          font-size: 1.1rem;
          outline: none;
          transition: border-color 0.2s;
        }

        .search-demo__input:focus {
          border-color: #ff00ff;
        }

        .search-demo__searching {
          position: absolute;
          right: 1rem;
          top: 50%;
          transform: translateY(-50%);
          color: #888888;
          font-size: 0.9rem;
        }

        .search-demo__presets {
          display: flex;
          flex-wrap: wrap;
          gap: 0.5rem;
          align-items: center;
          margin-bottom: 1rem;
        }

        .search-demo__presets-label {
          color: #888888;
          font-size: 0.9rem;
          margin-right: 0.5rem;
        }

        .search-demo__preset {
          padding: 0.25rem 0.75rem;
          background: #333333;
          color: #ffffff;
          border: none;
          cursor: pointer;
          font-size: 0.8rem;
          transition: background-color 0.2s;
        }

        .search-demo__preset:hover {
          background: #444444;
        }

        .search-demo__filter-controls {
          display: flex;
          gap: 1rem;
          align-items: center;
        }

        .search-demo__advanced-toggle {
          padding: 0.5rem 1rem;
          background: #333333;
          color: #ffffff;
          border: none;
          cursor: pointer;
          transition: background-color 0.2s;
        }

        .search-demo__advanced-toggle.active {
          background: #ff00ff;
        }

        .search-demo__advanced-toggle:hover {
          background: #444444;
        }

        .search-demo__advanced-toggle.active:hover {
          background: #ff33ff;
        }

        .search-demo__clear-filters {
          padding: 0.5rem 1rem;
          background: #444444;
          color: #ffffff;
          border: none;
          cursor: pointer;
          transition: background-color 0.2s;
        }

        .search-demo__clear-filters:hover {
          background: #555555;
        }

        .search-demo__advanced-filters {
          background: #2a2a2a;
          padding: 1.5rem;
          margin-bottom: 1rem;
          border: 1px solid #333333;
        }

        .search-demo__filter-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
          gap: 1rem;
        }

        .search-demo__filter-group {
          display: flex;
          flex-direction: column;
          gap: 0.5rem;
        }

        .search-demo__filter-label {
          color: #cccccc;
          font-size: 0.9rem;
          font-weight: 500;
        }

        .search-demo__filter-input,
        .search-demo__range-input {
          padding: 0.5rem;
          background: #1a1a1a;
          color: #ffffff;
          border: 1px solid #444444;
          outline: none;
          transition: border-color 0.2s;
        }

        .search-demo__filter-input:focus,
        .search-demo__range-input:focus {
          border-color: #ff00ff;
        }

        .search-demo__range-inputs {
          display: flex;
          gap: 0.5rem;
        }

        .search-demo__boolean-filters {
          display: flex;
          flex-direction: column;
          gap: 0.5rem;
        }

        .search-demo__checkbox {
          display: flex;
          align-items: center;
          gap: 0.5rem;
          cursor: pointer;
          font-size: 0.9rem;
        }

        .search-demo__filter-summary {
          background: #2a2a2a;
          padding: 0.75rem;
          margin-bottom: 1rem;
          color: #cccccc;
          font-size: 0.9rem;
          border-left: 3px solid #ff00ff;
        }

        .search-demo__results-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 1rem;
          padding-bottom: 0.5rem;
          border-bottom: 1px solid #333333;
        }

        .search-demo__results-info {
          display: flex;
          gap: 0.5rem;
          align-items: center;
        }

        .search-demo__query-time {
          color: #888888;
          font-size: 0.8rem;
        }

        .search-demo__sort-controls {
          display: flex;
          gap: 0.5rem;
          align-items: center;
        }

        .search-demo__sort-label {
          color: #cccccc;
          font-size: 0.9rem;
        }

        .search-demo__sort-select {
          padding: 0.25rem 0.5rem;
          background: #333333;
          color: #ffffff;
          border: 1px solid #444444;
        }

        .search-demo__sort-direction {
          padding: 0.25rem 0.5rem;
          background: #333333;
          color: #ffffff;
          border: none;
          cursor: pointer;
          font-size: 0.8rem;
        }

        .search-demo__results {
          display: grid;
          gap: 1rem;
          margin-bottom: 2rem;
        }

        .search-demo__results--grid {
          grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        }

        .search-demo__results--list {
          grid-template-columns: 1fr;
        }

        .search-demo__result-item {
          display: flex;
          gap: 1rem;
          background: #2a2a2a;
          padding: 1rem;
          border: 1px solid #333333;
          transition: border-color 0.2s;
        }

        .search-demo__result-item:hover {
          border-color: #444444;
        }

        .search-demo__result-thumbnail {
          flex-shrink: 0;
        }

        .search-demo__thumbnail {
          width: 60px;
          height: 60px;
          object-fit: cover;
        }

        .search-demo__no-thumbnail {
          width: 60px;
          height: 60px;
          background: #333333;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 0.7rem;
          color: #888888;
        }

        .search-demo__result-content {
          flex: 1;
          display: flex;
          flex-direction: column;
          gap: 0.25rem;
        }

        .search-demo__result-title {
          font-weight: bold;
          color: #ffffff;
        }

        .search-demo__result-artist {
          color: #cccccc;
          font-size: 0.9rem;
        }

        .search-demo__result-album {
          color: #aaaaaa;
          font-size: 0.8rem;
        }

        .search-demo__result-meta {
          display: flex;
          gap: 0.75rem;
          font-size: 0.7rem;
          color: #888888;
          margin-top: 0.5rem;
        }

        .search-demo__favorite {
          color: #ff00ff;
          font-weight: bold;
        }

        .search-demo__no-results {
          text-align: center;
          padding: 3rem;
          color: #888888;
        }

        .search-demo__no-results-message {
          margin-bottom: 1rem;
          font-size: 1.1rem;
        }

        .search-demo__clear-all {
          padding: 0.75rem 1.5rem;
          background: #ff00ff;
          color: #ffffff;
          border: none;
          cursor: pointer;
          font-size: 1rem;
        }

        .search-demo__pagination {
          display: flex;
          justify-content: center;
          align-items: center;
          gap: 1rem;
          margin: 2rem 0;
        }

        .search-demo__page-btn {
          padding: 0.5rem 1rem;
          background: #333333;
          color: #ffffff;
          border: none;
          cursor: pointer;
          transition: background-color 0.2s;
        }

        .search-demo__page-btn:disabled {
          background: #222222;
          color: #666666;
          cursor: not-allowed;
        }

        .search-demo__page-btn:not(:disabled):hover {
          background: #444444;
        }

        .search-demo__page-info {
          color: #cccccc;
        }

        .search-demo__error {
          background: #3a1a1a;
          color: #ff6666;
          padding: 1rem;
          margin: 1rem 0;
          border: 1px solid #ff3333;
          display: flex;
          justify-content: space-between;
          align-items: center;
        }

        .search-demo__retry-btn {
          padding: 0.5rem 1rem;
          background: #ff3333;
          color: #ffffff;
          border: none;
          cursor: pointer;
        }

        .search-demo__debug {
          margin-top: 2rem;
          background: #1a1a1a;
          padding: 1rem;
          border: 1px solid #333333;
        }

        .search-demo__debug h3 {
          margin: 0 0 1rem 0;
          color: #cccccc;
        }

        .search-demo__debug-content {
          background: #0a0a0a;
          padding: 1rem;
          color: #888888;
          font-size: 0.8rem;
          overflow-x: auto;
          margin: 0;
        }

        @media (max-width: 768px) {
          .search-demo {
            padding: 1rem;
          }

          .search-demo__results--grid {
            grid-template-columns: 1fr;
          }

          .search-demo__filter-grid {
            grid-template-columns: 1fr;
          }

          .search-demo__results-header {
            flex-direction: column;
            gap: 1rem;
            align-items: flex-start;

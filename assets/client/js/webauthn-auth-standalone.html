      color: #6b7280;
      font-size: 1.1rem;

      color: #1e40af;

      color: #1e40af;
      font-size: 1rem;
    }
    .instructions ul {
      margin: 8px 0 0 0;
      padding-left: 20px;
    }
    .instructions li {
      margin-bottom: 4px;
      font-size: 0.875rem;
    }

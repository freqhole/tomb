        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap');

        .zune-demo {
          min-height: 100vh;
          background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
          color: #ffffff;
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          font-weight: 300;
          letter-spacing: 0.3px;

          display: flex;
          flex-direction: column;
        }

        /* Header */
        .zune-header {
          background: rgba(0, 0, 0, 0.4);
          backdrop-filter: blur(20px);
          padding: 1.5rem 2rem;
          position: sticky;
          top: 0px;
          z-index: 1;
        }

        .zune-branding {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 1.5rem;
        }

        .zune-logo {
          display: flex;
          align-items: center;
          gap: 1rem;
        }

        .zune-logo-square {
          width: 28px;
          height: 28px;
          background: linear-gradient(135deg, #ff0080 0%, #ff4081 100%);
          border-radius: 2px;
        }

        .zune-logo-text {
          font-size: 1.5rem;
          font-weight: 300;
          color: #ffffff;
          text-transform: lowercase;
        }

        .zune-search-container {
          flex: 1;
          max-width: 400px;
          margin-left: 3rem;
          position: relative;
          display: flex;
          align-items: center;
          gap: 0.5rem;
        }

        .zune-search-box {
          flex: 1;
        }

        .zune-search-clear {
          background: rgba(255, 255, 255, 0.1);
          border: none;
          color: rgba(255, 255, 255, 0.6);
          cursor: pointer;
          padding: 0.5rem;
          border-radius: 4px;
          transition: all 0.3s ease;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .zune-search-clear:hover {
          background: #ff0080;
          color: #ffffff;
        }

        /* Dark theme overrides for SearchBox */
        .zune-search-box .search-box__input {
          width: 100%;
          padding: 0.75rem 1rem;
          background: rgba(255, 255, 255, 0.1);
          color: #ffffff;
          font-size: 1rem;
          font-weight: 300;
          transition: all 0.3s ease;
        }

        .zune-search-box .search-box__input:focus {
          border-color: #ff0080;
          box-shadow: 0 0 0 2px rgba(255, 0, 128, 0.2);
        }

        .zune-search-box .search-box__input::placeholder {
          color: rgba(255, 255, 255, 0.5);
        }

        /* Navigation */
        .zune-nav {
          display: flex;
          gap: 0.5rem;
          overflow-x: auto;
          scrollbar-width: none;
        }

        .zune-nav::-webkit-scrollbar {
          display: none;
        }

        .zune-nav-item {
          padding: 1rem 2rem;
          background: transparent;
          border: none;
          color: rgba(255, 255, 255, 0.6);
          font-size: 1.1rem;
          font-weight: 400;
          cursor: pointer;
          transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
          text-transform: lowercase;
          white-space: nowrap;
          position: relative;
          overflow: hidden;
        }

        .zune-nav-item::before {
          content: '';
          position: absolute;
          top: 0;
          left: -100%;
          width: 100%;
          height: 100%;
          background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
          transition: left 0.6s ease;
        }

        .zune-nav-item:hover::before {
          left: 100%;
        }

        .zune-nav-item:hover {
          color: #ffffff;
          background: rgba(255, 255, 255, 0.05);
        }

        .zune-nav-item.active {
          color: #ff0080;
          background: rgba(255, 0, 128, 0.1);
          font-weight: 500;
        }

        /* Main Layout */
        .zune-main {
          display: flex;
          flex: 1;
          min-height: 0;
        }

        .zune-sidebar, .zune-center, .zune-queue {
          height: calc(100dvh - 124px);
          padding: 2rem 2rem 86px 2rem;
        }

        /* Sidebar */
        .zune-sidebar {
          width: 300px;
          background: rgba(0, 0, 0, 0.2);
          overflow-y: auto;
          scrollbar-width: thin;
          min-height: 0;
        }

        .zune-filter-section h3 {
          margin: 0 0 1rem 0;
          font-size: 1.2rem;
          font-weight: 500;
          color: #ffffff;
          text-transform: lowercase;
        }

        .zune-filter-list {
          display: flex;
          flex-direction: column;
          gap: 0.25rem;
        }

        .zune-filter-item {
          display: flex;
          justify-content: space-between;
          align-items: center;
          width: 100%;
          padding: 0.75rem 1rem;
          background: transparent;
          border: none;
          color: rgba(255, 255, 255, 0.7);
          font-size: 0.9rem;
          font-weight: 300;
          text-align: left;
          cursor: pointer;
          transition: all 0.3s ease;
          border-radius: 4px;
          text-transform: lowercase;
        }

        .zune-filter-item:hover {
          background: rgba(255, 255, 255, 0.1);
          color: #ffffff;
        }

        .zune-filter-item.active {
          background: rgba(255, 0, 128, 0.2);
          color: #ff0080;
        }

        .zune-filter-count {
          font-size: 0.8rem;
          opacity: 0.7;
        }

        /* Center Content */
        .zune-center {
          flex: 1;
          overflow-y: auto;
          display: flex;
          min-height: 0;
          flex-direction: column;
        }

        .zune-content-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 2rem;
          flex-shrink: 0;
        }

        .zune-title {
          font-size: 3rem;
          font-weight: 300;
          margin: 0;
          color: #ffffff;
          text-transform: lowercase;
          transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .zune-stats {
          color: rgba(255, 255, 255, 0.6);
          font-size: 1rem;
          font-weight: 300;
        }

        .zune-play-all-btn {
          display: flex;
          align-items: center;
          gap: 0.5rem;
          padding: 0.75rem 1.5rem;
          background: linear-gradient(135deg, #ff0080 0%, #ff4081 100%);
          border: none;
          color: #ffffff;
          font-size: 0.9rem;
          font-weight: 500;
          cursor: pointer;
          transition: all 0.3s ease;
          border-radius: 4px;
          text-transform: lowercase;
        }

        .zune-play-all-btn:hover {
          background: linear-gradient(135deg, #ff1a8a 0%, #ff5a8a 100%);
        }

        .zune-content-area {
          flex: 1;
          transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
          overflow-y: auto;
        }

        .zune-content-area.exiting {
          opacity: 0;
          transform: translateX(-30px);
        }

        .zune-content-area.entering {
          opacity: 0;
          transform: translateX(30px);
        }

        /* Loading &amp; Error States */
        .zune-loading {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 1rem;
          padding: 3rem;
          color: rgba(255, 255, 255, 0.6);
        }

        .zune-loading-spinner {
          width: 40px;
          height: 40px;
          border: 3px solid rgba(255, 255, 255, 0.1);
          border-top: 3px solid #ff0080;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }

        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }

        .zune-error {
          text-align: center;
          padding: 3rem;
          color: #ff6b6b;
        }

        .zune-error button {
          margin-top: 1rem;
          padding: 0.75rem 1.5rem;
          background: #ff0080;
          border: none;
          color: white;
          border-radius: 4px;
          cursor: pointer;
        }

        /* Songs Table */
        .zune-songs-table,
        .zune-suggestions-table {
          display: flex;
          flex-direction: column;
          background: rgba(255, 255, 255, 0.02);
          border-radius: 8px;
        }

        .zune-table-header {
          display: grid;
          grid-template-columns: 60px 1fr 200px 200px 80px 60px;
          padding: 1rem;
          background: rgba(255, 255, 255, 0.05);
          font-size: 0.8rem;
          font-weight: 500;
          color: rgba(255, 255, 255, 0.7);
          text-transform: uppercase;
          letter-spacing: 0.5px;
          position: sticky;
          top: 0;
          background: rgba(0, 0, 0, 0.9);
          z-index: 1;
        }

        .zune-suggestions-table .zune-table-header {
          grid-template-columns: 150px 1fr 100px 60px;
        }

        .zune-table-row {
          display: grid;
          grid-template-columns: 60px 1fr 200px 200px 80px 60px;
          padding: 1rem;
          cursor: pointer;
          transition: background 0.3s ease;
          align-items: center;
        }

        .zune-suggestions-table .zune-table-row {
          grid-template-columns: 150px 1fr 100px 60px;
        }

        .zune-suggestion-group-header {
          display: grid;
          grid-template-columns: 150px 1fr 100px 60px;
          padding: 0.75rem 1rem;
          background: rgba(255, 0, 128, 0.1);
          font-weight: 500;
          color: #ff0080;
          text-transform: lowercase;
        }

        .zune-suggestion-row:hover {
          background: rgba(255, 255, 255, 0.05);
        }

        .zune-table-row:hover {
          background: rgba(255, 255, 255, 0.05);
        }

        .zune-table-row.playing {
          background: rgba(255, 0, 128, 0.1);
        }

        .zune-table-cell {
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
          font-size: 0.9rem;
        }

        .zune-track-number {
          color: rgba(255, 255, 255, 0.5);
          font-size: 0.8rem;
          text-align: center;
        }

        .zune-playing-indicator {
          display: flex;
          gap: 2px;
          align-items: center;
          justify-content: center;
        }

        .zune-wave {
          width: 3px;
          height: 12px;
          background: #ff0080;
          border-radius: 1px;
          animation: wave 1s infinite ease-in-out;
        }

        .zune-wave:nth-child(2) {
          animation-delay: 0.2s;
        }

        .zune-wave:nth-child(3) {
          animation-delay: 0.4s;
        }

        @keyframes wave {
          0%, 100% { height: 6px; }
          50% { height: 12px; }
        }

        .zune-song-title-cell {
          display: flex;
          align-items: center;
          gap: 0.75rem;
        }

        .zune-song-thumbnail {
          width: 40px;
          height: 40px;
          border-radius: 4px;
          object-fit: cover;
        }

        .zune-song-info {
          display: flex;
          align-items: center;
          gap: 0.5rem;
          overflow: hidden;
        }

        .zune-song-title {
          font-weight: 500;
          color: #ffffff;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .zune-favorite-indicator {
          color: #ff0080;
          font-size: 0.8rem;
        }

        .zune-action-btn {
          width: 32px;
          height: 32px;
          background: rgba(255, 255, 255, 0.1);
          border: none;
          color: rgba(255, 255, 255, 0.7);
          border-radius: 50%;
          cursor: pointer;
          transition: all 0.3s ease;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .zune-action-btn:hover {
          background: #ff0080;
          color: #ffffff;
        }

        /* Grid Layout */
        .zune-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
          gap: 1.5rem;
        }

        .zune-grid-card {
          background: rgba(255, 255, 255, 0.05);
          padding: 1.5rem;
          cursor: pointer;
          transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
          border-radius: 8px;
          text-align: center;
        }

        .zune-grid-card:hover {
          background: rgba(255, 255, 255, 0.1);
          transform: translateY(-4px);
        }

        .zune-grid-icon {
          color: #ff0080;
          margin-bottom: 1rem;
          display: flex;
          justify-content: center;
        }

        .zune-grid-card h3 {
          font-size: 1.1rem;
          font-weight: 500;
          margin: 0 0 0.5rem 0;
          color: #ffffff;
        }

        .zune-grid-card p {
          font-size: 0.9rem;
          color: rgba(255, 255, 255, 0.7);
          margin: 0 0 0.25rem 0;
        }

        .zune-description {
          font-size: 0.8rem;
          color: rgba(255, 255, 255, 0.5);
          font-style: italic;
        }

        /* Queue Panel */
        .zune-queue {
          width: 350px;
          background: rgba(0, 0, 0, 0.3);
          display: flex;
          flex-direction: column;
          animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
          from { transform: translateX(100%); }
          to { transform: translateX(0); }
        }

        .zune-queue-header {
          padding: 1.5rem;
          display: flex;
          justify-content: space-between;
          align-items: center;
          background: rgba(0, 0, 0, 0.2);
        }

        .zune-queue-header h3 {
          margin: 0;
          color: #ffffff;
          font-size: 1.1rem;
          font-weight: 500;
          text-transform: lowercase;
        }

        .zune-queue-controls {
          display: flex;
          gap: 0.5rem;
        }

        .zune-queue-controls button {
          background: rgba(255, 255, 255, 0.1);
          border: none;
          color: #ffffff;
          padding: 0.5rem;
          border-radius: 4px;
          cursor: pointer;
          font-size: 0.8rem;
          transition: background 0.3s ease;
          display: flex;
          align-items: center;
          gap: 0.25rem;
        }

        .zune-queue-controls button:hover {
          background: #ff0080;
        }

        .zune-queue-list {
          flex: 1;
          overflow-y: auto;
          padding: 1rem;
        }

        .zune-queue-item {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0.75rem;
          cursor: pointer;
          transition: background 0.3s ease;
          border-radius: 4px;
          margin-bottom: 0.5rem;
        }

        .zune-queue-item:hover {
          background: rgba(255, 255, 255, 0.1);
        }

        .zune-queue-item.current {
          background: rgba(255, 0, 128, 0.2);
        }

        .zune-queue-info h4 {
          margin: 0;
          font-size: 0.9rem;
          font-weight: 500;
          color: #ffffff;
        }

        .zune-queue-info p {
          margin: 0.25rem 0 0 0;
          font-size: 0.8rem;
          color: rgba(255, 255, 255, 0.7);
        }

        .zune-queue-remove {
          background: none;
          border: none;
          color: rgba(255, 255, 255, 0.5);

          padding: 0.25rem;
          transition: color 0.3s ease;
          display: flex;
          align-items: center;
        }

        .zune-queue-remove:hover {
          color: #ff0080;
        }

        .zune-queue-empty {
          text-align: center;
          padding: 2rem;
          color: rgba(255, 255, 255, 0.5);

        .zune-player {
          position: fixed;
          bottom: 0;
          left: 0;
          right: 0;
          background: rgba(0, 0, 0, 0.5);

          padding: 1rem 2rem;
          display: flex;
          align-items: center;
          gap: 2rem;
          z-index: 1000;
          animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
          from { transform: translateY(100%); opacity: 0; }
          to { transform: translateY(0); opacity: 1; }
        }

        .zune-player-info {
          display: flex;
          align-items: center;
          gap: 1rem;
          min-width: 250px;
          width: 100%;
        }

        .zune-artwork-placeholder {
          width: 50px;
          height: 50px;
          background: linear-gradient(135deg, #333 0%, #555 100%);
          border-radius: 4px;
          display: flex;
          align-items: center;
          justify-content: center;
          color: rgba(255, 255, 255, 0.3);
        }

        .zune-artwork-image {
          width: 50px;
          height: 50px;
          border-radius: 4px;
          object-fit: cover;
        }

        .zune-player-text {
          flex: 1;
        }

        .zune-player-title {
          font-size: 1rem;
          font-weight: 500;
          margin: 0;
          color: #ffffff;
        }

        .zune-player-artist {
          font-size: 0.9rem;
          font-weight: 300;
          margin: 0;
          color: rgba(255, 255, 255, 0.7);
        }

        .zune-player-controls {
          display: flex;
          align-items: center;
          gap: 1rem;
        }

        .zune-control-btn {
          width: 44px;
          height: 44px;
          border: none;
          border-radius: 50%;
          background: rgba(255, 255, 255, 0.1);
          color: #ffffff;
          cursor: pointer;
          transition: all 0.3s ease;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .zune-control-btn:hover {
          background: rgba(255, 255, 255, 0.2);
          transform: scale(1.1);
        }

        .zune-control-btn.primary {
          background: linear-gradient(135deg, #ff0080 0%, #ff4081 100%);
          width: 52px;
          height: 52px;
        }

        .zune-control-btn.primary:hover {
          background: linear-gradient(135deg, #ff1a8a 0%, #ff5a8a 100%);
        }

        .zune-control-btn:disabled {
          opacity: 0.4;
          cursor: not-allowed;

        .zune-player-progress {

          gap: 1rem;

          transition: height 0.2s ease;
          min-width: 100px;

        .zune-progress-bar:hover {

        .zune-progress-fill {

          background: #ff0080;

        .zune-volume-slider::-moz-range-thumb {

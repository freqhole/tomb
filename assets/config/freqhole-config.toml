# freqhole configuration file
#
# TOML syntax notes:
#   - basic strings: "hello" (supports escapes like \n, \")
#   - literal strings: 'hello' (no escapes, backslash is literal)
#   - multi-line strings: """...""" or '''...''' (triple quotes)
#   - arrays: [1, 2, 3] or ["a", "b", "c"]
#
# authentication methods (all available, no config needed):
#   1. WebAuthn passkeys (if webauthn_enabled=true and feature compiled)
#   2. API keys (stored in user_accountz.api_key column)
#   3. invite codes (creates session cookie after redemption)
#
# user roles:
#   - root: superuser with all permissionz
#   - admin: full access (user management, analytics, etc.)
#   - member: standard user (upload, edit, create playlists)
#   - viewer: read-only (browse, play, favorite/rate only)

# REQUIRED: data directory - base directory for all grimoire data
# can be relative (./data) or absolute (/var/lib/freqhole)
# contains: database file, temp directory, wordlist
data_dir = "./data"

# ============================================================================
# database configuration
# ============================================================================
[database]
# REQUIRED: SQLite database filename (stored in data_dir)
# the full path will be: {data_dir}/{filename}
filename = "grimoire.db"

# REQUIRED: automatically run database migrations on startup
# set to false if you want to run migrations manually
auto_run_migrations = true

# OPTIONAL: connection pool settings
# each database operation creates a short-lived connection pool.
# these settings control pool behavior and can help with slow hardware.
#
# max_connections (default: 5): max simultaneous connections to the SQLite file
#   SQLite handles one writer at a time, so more connections mostly helps reads.
#   lowering this can reduce contention on very slow storage.
#
# acquire_timeout_seconds (default: 120): how long to wait for a connection before giving up
#   if you see "pool timed out while waiting for an open connection" errors,
#   increase this value. the default 120s should be fine for most cases including
#   Raspberry Pi, but heavy scan jobs on slow SD cards might need more.
#
# idle_timeout_seconds (default: 300): how long idle connections stay open before closing
max_connections = 5
acquire_timeout_seconds = 120
idle_timeout_seconds = 300

# ============================================================================
# media processing and categorization
# ============================================================================
[media]
# OPTIONAL: maximum file size for filesystem storage (in bytes)
# (default: 1073741824 = 1GB)
max_fs_file_size = 1073741824

# OPTIONAL: supported audio file formats for music scanning
# files with these extensions will be processed
# (default: ["mp3", "ogg", "wav", "flac", "m4a", "aif", "aiff"])
supported_audio_formats = ["mp3", "ogg", "wav", "flac", "m4a", "aif", "aiff"]

# OPTIONAL: ffmpeg configuration for audio processing
# used for extracting album art thumbnails and generating waveform visualizations
#
# these settings are optional - if omitted, the defaults below will be used.
# customize if you need to:
#   - use a different path to ffmpeg (e.g., "/usr/local/bin/ffmpeg")
#   - change ffmpeg arguments (quality, size, filters, etc.)
#   - swap in alternative tools (avconv, custom scripts, etc.)
#
# placeholders in args strings:
#   {input}  - replaced with input audio file path
#   {output} - replaced with temporary output file path
#
# the command executed will be: <ffmpeg_path> <args with placeholders replaced>
# OPTIONAL (default: "ffmpeg")
ffmpeg_path = "ffmpeg"
# OPTIONAL (default: "-i {input} -an -vcodec mjpeg -vframes 1 -q:v 2 -y {output}")
extract_album_art_args = "-i {input} -an -vcodec mjpeg -vframes 1 -q:v 2 -y {output}"
# OPTIONAL: use triple-quoted literal strings ('''...''') when the value contains double quotes
# this avoids escaping hell. TOML also supports multi-line strings with """ or '''
# (default: '-i {input} -filter_complex "color=black:s=800x200[bg];[0:a]showwavespic=s=800x200:colors=0xff00ff[fg];[bg][fg]overlay=format=auto" -frames:v 1 -y {output}')
generate_waveform_args = '''-i {input} -filter_complex "color=black:s=800x200[bg];[0:a]showwavespic=s=800x200:colors=0xff00ff[fg];[bg][fg]overlay=format=auto" -frames:v 1 -y {output}'''

# OPTIONAL: ffprobe fallback for duration extraction
# when lofty can't determine audio duration (e.g. for WMA, some m4a, opus-in-ogg),
# ffprobe is used as a fallback to extract the duration from the file.
# if ffprobe_path is omitted or null, the fallback is skipped and duration will be null.
# ffprobe is part of the ffmpeg suite - install ffmpeg to get it.
#
# the command executed will be: <ffprobe_path> <args with {input} replaced>
# ffprobe_duration_args: output must be a single line with duration in seconds (e.g. "234.567")
# ffprobe_properties_args: output must be JSON with format and streams sections
# OPTIONAL (default: null - fallback disabled)
ffprobe_path = "ffprobe"
# OPTIONAL (default: "-v quiet -show_entries format=duration -of csv=p=0 {input}")
ffprobe_duration_args = "-v quiet -show_entries format=duration -of csv=p=0 {input}"
# OPTIONAL (default: "-v quiet -print_format json -show_format -show_streams {input}")
ffprobe_properties_args = "-v quiet -print_format json -show_format -show_streams {input}"

# OPTIONAL: duplicate detection during scan
# skip importing songs that match existing songs (same artist, album, title, track/disc number, similar duration)
# OPTIONAL (default: true)
skip_duplicates = true
# OPTIONAL: generate CSV report of skipped duplicates (saved to data_dir/duplicate_report.csv)
# (default: false)
generate_scan_duplicate_report = false

# ============================================================================
# MusicBrainz integration for metadata enrichment
# ============================================================================
[musicbrainz]
# OPTIONAL: enable MusicBrainz API integration for enhanced metadata (default: false)
# allows searching for album/artist information and cover art
enabled = true
# note: user agent is hardcoded in grimoire as "tomb-musicbrainz/1.0"

# ============================================================================
# logging configuration
# ============================================================================
[logging]
# REQUIRED: log level controls verbosity
# options: "trace", "debug", "info", "warn", "error"
# recommended: "info" ("debug" will log a LOT)
level = "info"

# ============================================================================
# OPTIONAL: server configuration
# this entire section is optional - only needed when running the HTTP server
# if you only use the CLI, you can omit or comment out this section
# ============================================================================
[server]
# server identification (all REQUIRED when [server] section exists)
# these fields are exposed via the public /api/hello endpoint (no auth required)
# remote clients fetch this info when adding yr server to their remote list

# REQUIRED: server display name
name = "freqhole"
# REQUIRED: server version (semantic versioning recommended)
version = "0.1.3"
# OPTIONAL: server description (default: null)
description = "get yr freq on"

# REQUIRED: server host and port
# host: "0.0.0.0" = all interfaces, "127.0.0.1" = localhost only
host = "127.0.0.1"
port = 8080

# OPTIONAL: server image (default: null)
# path to server image/logo for remote client UI
#   - can be relative to data_dir or an absolute path
#   - served publicly at /api/hello/image (no auth required)
#   - displayed in remote client UI when selecting/viewing this server
#   - recommended: square image, 256x256px or larger, PNG/JPG format
#   - example: "server-icon.png" → accessible at /api/hello/image
image_path = ""

# OPTIONAL: start job processor in the server (default: false)
# when enabled (true):
#   - server spawns a background task that continuously processes jobs
#   - jobs are processed automatically as they're created
#   - graceful shutdown on SIGTERM/SIGINT
# when disabled (false):
#   - jobs must be processed separately via CLI
#   - run: freqhole jobs run-processor
#
# recommendation: true
start_job_runner = true

# ============================================================================
# authentication configuration
# ============================================================================
[server.auth]
# OPTIONAL: enable WebAuthn passkey authentication (default: false)
# note: requires binary built with --features webauthn (enabled by default)
# set to false to disable passkey auth (API keys and invite codes still work)
webauthn_enabled = true

# OPTIONAL: session max age in seconds (default: 0 - never expire)
# controls how long authentication sessions remain valid
#
# set to 0 or negative for sessions that never expire (recommended for personal use)
# set to positive number for automatic logout after inactivity
#
# examples:
#   0 or -1: never expire (sessions last forever)
#   3600: 1 hour
#   86400: 1 day
#   604800: 1 week
#
# note: Safari and some browsers may still clear cookies willy-nilly
# this setting controls server-side session expiration only
session_max_age_seconds = 0

# OPTIONAL: session cookie mode (default: "auto")
#
# controls how session cookies behave for browser authentication.
# choose based on yr deployment:
#
# "auto" (default): dual-cookie for maximum compatibility
#   sets TWO session cookies on every response:
#   - `freqhole_session` with SameSite=Lax (for HTTP same-site)
#   - `__Secure-freqhole_session` with SameSite=None + Secure (for HTTPS cross-site)
#   browser automatically sends whichever works for the request context.
#   
#   works with: HTTP localhost dev, same-origin static hosting, cross-site HTTPS
#   does NOT work with: cross-site HTTP (impossible - browser security)
#
# "lax": single cookie, SameSite=Lax
#   simpler, one cookie, smaller response headers.
#   
#   works with: same-site requests (including localhost different ports)
#   does NOT work with: cross-site HTTPS
#
# "none": single cookie, SameSite=None + Secure=true
#   for servers always behind HTTPS (reverse proxy, tailscale, cloudflare, etc.)
#   
#   works with: HTTPS cross-site
#   does NOT work with: any HTTP (cookies never sent)
#
session_cookie_mode = "auto"

# OPTIONAL: allowed origins for CORS and WebAuthn (default: [] - same-origin only)
#
# this single list is used for both CORS headers and WebAuthn (passkey) origin validation.
# the server reflects the request's Origin header back (not "*") which is required
# for credentials and passkey authentication to work.
#
# the rp_id (relying party ID) for WebAuthn (passkey) is automatically extracted from the
# origin's hostname. for example:
#   - "http://localhost:1420"        → rp_id = "localhost"
#   - "https://music.freqhole.net"   → rp_id = "music.freqhole.net"
#   - "https://foo.bar.example.com"  → rp_id = "foo.bar.example.com"
#
# special value "any":
#   use "any" to allow any origin. the server will reflect the request's Origin
#   header back (still not "*"). useful for development, but consider security
#   implications for production. webauthn will still work because rp_id is
#   extracted from the request origin.
#
# if not specified (empty array or omitted):
#   - CORS: only same-origin requests work (cross-origin blocked)
#     note: if you serve the web UI via [server.static_files], it's same-origin
#     and works fine without configuring allowed_origins but:
#   - WebAuthn (passkey): will fail validation (webauthn requires at least one origin)
#
# examples:
#   allowed_origins = ["any"]                              # allow any origin
#   allowed_origins = ["http://localhost:1420"]            # single dev origin
#   allowed_origins = ["http://localhost:1420", "http://localhost:5173"]
#   allowed_origins = ["https://music.freqhole.net", "https://staging.freqhole.net"]
allowed_origins = ["http://localhost:1420", "http://localhost:5173"]

# ============================================================================
# static file serving
# ============================================================================
[server.static_files]
# REQUIRED: enable serving static files (HTML, JS, CSS, images, etc.)
enabled = false
# REQUIRED when enabled=true: directory to serve from (must be absolute path)
# OPTIONAL when enabled=false (can omit)
# directory = "/path/to/static"

# ============================================================================
# CORS (Cross-Origin Resource Sharing) configuration
# ============================================================================
[server.cors]
# REQUIRED: enable CORS headers
# if enabled with no auth.allowed_origins, only same-origin requests work
enabled = true

# ============================================================================
# OPTIONAL: media fetching from external sources
# this entire section is optional (default: null - feature disabled)
# ============================================================================
[server.fetch_music]
# REQUIRED when section exists: enable media fetching functionality
# when disabled, fetch routes will return 404
enabled = false

# REQUIRED when enabled=true: absolute path where fetched files are temporarily stored
# OPTIONAL when enabled=false (can omit)
# files are downloaded here, then processed and moved to blob storage
# must be an absolute path
# example: "/var/lib/freqhole/fetch" or "/Users/you/freqhole/data/fetch"
output_dir = "/path/to/fetch/directory"

# OPTIONAL: command to extract metadata without downloading (default: null)
# used for precheck/deduplication - checks if content already exists
# before actually downloading. should output JSON metadata.
#
# typically uses yt-dlp or youtube-dl:
#   --print-json: output metadata as JSON
#   --no-download: don't download the file
#   example: "yt-dlp --print-json --no-download"
#
# note: --no-playlist removed to support playlists and collections
# precheck will return metadata for all items in collection
#
# the command will be invoked as: <command> <url>
precheck_command = "yt-dlp --print-json --no-download"

# OPTIONAL: command to actually fetch and download media files (default: null)
# should download audio, extract metadata, and output the file path
#
# IMPORTANT: supports playlists and collections with best-effort downloading
#   --ignore-errors: continue if one item fails, don't abort entire job
#   job only fails if NOTHING could be downloaded
#   successfully downloaded items are processed even if others failed
#
# recommended yt-dlp arguments:
#   --ignore-errors: continue on errors (critical for playlists)
#   --extract-audio: extract audio from video
#   --audio-format mp3: convert to mp3
#   --audio-quality 0: best quality (0-9, 0=best)
#   --add-metadata: embed metadata in file
#   --embed-thumbnail: embed album art
#   --no-overwrites: don't overwrite existing files
#   --output: filename template (include %(id)s to prevent duplicates)
#   --print after_move:filepath: output final file path for each download
#
# output pattern explained:
#   %(uploader)s: channel/artist name
#   %(title)s: video/track title
#   %(id)s: unique content ID (prevents duplicates!)
#   %(ext)s: file extension
#
# CRITICAL: do NOT wrap the --output template in quotes!
#   BAD:  --output '%(uploader)s - %(title)s.%(ext)s'
#   GOOD: --output %(uploader)s-%(title)s-[%(id)s].%(ext)s
#
# why: quotes prevent yt-dlp from expanding template variables, causing
# all files to have literal filenames like "'%(title)s.mp3" which results
# in all downloads overwriting the same file!
#
# also: avoid spaces and special characters in filenames - use hyphens
# single quotes in filenames can cause issues with shell commands
#
# example: "yt-dlp --ignore-errors --extract-audio --audio-format mp3 --audio-quality 0 --add-metadata --embed-thumbnail --no-overwrites --output %(uploader)s-%(title)s-[%(id)s].%(ext)s --print after_move:filepath"
#
# the command will be invoked as: <command> --paths <job_id_dir> <url>
# it should print one downloaded file path per line to stdout
fetch_command = "yt-dlp --ignore-errors --extract-audio --audio-format mp3 --audio-quality 0 --add-metadata --embed-thumbnail --no-overwrites --output %(uploader)s-%(title)s-[%(id)s].%(ext)s --print after_move:filepath"

# ============================================================================
# OPTIONAL: federation/P2P configuration
# enables peer-to-peer music sharing via iroh transport + haruspex coordination
# this entire section is optional (default: disabled)
#
# federation allows freqhole servers to discover each other and share music
# directly without a central server. uses iroh for P2P QUIC transport and
# haruspex (Supabase) for peer discovery/coordination.
#
# workflow:
# 1. admin syncs group members from haruspex to freqhole users
# 2. freqhole server broadcasts presence (node_id) to haruspex
# 3. other servers discover peers and can initiate P2P connections
# 4. requests are proxied over iroh transport, authenticated by node_id
# ============================================================================
[federation]
# REQUIRED when using federation: enable federation features (default: false)
enabled = false

# REQUIRED when enabled=true: haruspex (Supabase) coordination server URL
# this is where peer discovery and group coordination happens
#
# local development: http://127.0.0.1:54321
# production: https://your-project.supabase.co
#
# IMPORTANT: must match the haruspex instance your group uses
haruspex_url = ""

# REQUIRED when enabled=true: haruspex anon/publishable key
# this is the PUBLIC key safe to use in client-side code
# do NOT use the service role key here!
#
# find this in Supabase dashboard: Settings > API > Project API keys > anon/public
haruspex_anon_key = ""

# OPTIONAL: automatically create freqhole users for authenticated peers (default: false)
# when true: first P2P request from a known node_id creates a user with default_role
# when false: users must be synced manually via CLI (freqhole federation sync)
#
# auto_create_users=true is convenient but means anyone in your haruspex group
# gets access. set to false for more control over who can access your server.
auto_create_users = false

# OPTIONAL: role to assign auto-created users (default: "viewer")
# options:
#   - "viewer": read-only (browse, play, but no edits)
#   - "member": standard user (upload, edit, create playlists)
#   - "admin": full access (includes user management)
default_role = "viewer"

# OPTIONAL: maximum message size in MB for P2P JSON payloads (default: 10)
# this limits how large a single request/response can be over the iroh transport.
# does NOT apply to blob streaming (audio files, images) - those stream in chunks.
#
# the default 10MB should be plenty for most API responses (song lists, metadata, etc.)
# increase if you have extremely large playlists or search results that exceed this.
# decrease if you want to limit memory usage on constrained devices.
# max_message_size_mb = 10

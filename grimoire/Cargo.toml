[package]
name = "grimoire"
version = "0.1.0"
edition = "2021"

[dependencies]
sqlx = { workspace = true, features = ["runtime-tokio-rustls", "sqlite", "time", "json", "migrate"] }
tokio = { workspace = true, features = ["full"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
time = { workspace = true }
async-trait = { workspace = true }
uuid = { workspace = true }
sha2 = { workspace = true }
base64 = { workspace = true }
lofty = { workspace = true }
walkdir = { workspace = true }
image = { workspace = true }
mime_guess = { workspace = true }
tracing = { workspace = true }
bigdecimal = { workspace = true }
url = { workspace = true }
regex = { workspace = true }
rand = { workspace = true }
reqwest = { workspace = true }
urlencoding = "2.1"
once_cell = "1.19"
json5 = "0.4"
csv = "1.3"

clap = { version = "4.4", features = ["derive"] }
humantime = "2.1"
sea-query = { version = "0.30", features = ["backend-sqlite"] }
sea-query-sqlx = { version = "0.8.0-rc.11", features = ["sqlx-sqlite"] }

tracing-subscriber = "0.3"

[[bin]]
name = "grimoire"
path = "src/main.rs"

[features]
default = []
webauthn = ["webauthn-rs"]

[dependencies.webauthn-rs]
workspace = true
optional = true
